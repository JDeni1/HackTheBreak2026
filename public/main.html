<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shortcut Helper</title>
  </head>
  <body>
    <div class="jumbotron jumbotron-fluid">
      <div class="container">
        <h1 class="display-4">Welcome to our Shortcut Helper!</h1>
        <p class="lead">
          We specialize in Elipse and VS Code Shortcuts and How to Guides.
          Select your software from the dropdown below.
        </p>
      </div>
    </div>

    <!--SearchBar-->
    <div class="search-container">
      <input
        type="text"
        id="searchBar"
        class="shortcuts"
        placeholder="Search shortcuts..."
      />
      <div id="resultsDropdown"></div>
    </div>

    <!--Dropdown-->
    <div class="dropdown">
      <button class="dropbtn">Choose Software ▼</button>
      <div class="dropdown-content">
        <div class="software-option">
          Eclipse
          <div class="nested-dropdown">
            <div
              class="feature"
              data-software="eclipse"
              data-feature="shortcuts"
            >
              Shortcuts
            </div>
            <div class="feature" data-software="eclipse" data-feature="howto">
              How To
            </div>
          </div>
        </div>
        <div class="software-option">
          VS Code
          <div class="nested-dropdown">
            <div
              class="feature"
              data-software="vscode"
              data-feature="shortcuts"
            >
              Shortcuts
            </div>
            <div class="feature" data-software="vscode" data-feature="howto">
              How To
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="shortcutContent"></div>

    <script src="src/main.js"></script>
    <style>
      .search-container {
        position: relative;
        width: 400px;
        margin: 20px auto;
      }

      #searchBar {
        width: 100%;
        padding: 12px 15px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #1e1f26;
        color: white;
        font-size: 16px;
      }

      #resultsDropdown {
        margin-top: 8px;
        width: 100%;
        background: white;
        border: 1px solid #ccc;
        border-radius: 8px;
        overflow: hidden;
      }

      #resultsDropdown div {
        padding: 10px 12px;
        color: black;
        cursor: pointer;
        border-bottom: 1px solid #eee;
      }

      #resultsDropdown div:hover {
        background: #f2f2f2;
      }

      /* #resultsDropdown {
  position: absolute;
  top: 110%;
  left: 0;
  width: 100%;
  background: #1e1f26;
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
  max-height: 300px;
  overflow-y: auto;
  display: none;
  z-index: 100;
} */

      .result-item {
        padding: 12px 15px;
        border-bottom: 1px solid #2c2c2c;
        transition: 0.2s;
      }

      .result-item:hover {
        background: #2a2c35;
        cursor: pointer;
      }

      .result-title {
        font-weight: bold;
        color: #4da3ff;
      }

      .result-shortcut {
        font-size: 14px;
        color: #ccc;
      }

      .highlight {
        background: #ffd54f;
        color: black;
        padding: 2px 4px;
        border-radius: 3px;
      }
    </style>
  </body>
</html>
