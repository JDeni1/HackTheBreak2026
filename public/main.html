<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shortcut Helper</title>
  </head>
  <body>
    <div class="jumbotron jumbotron-fluid">
      <div class="container">
        <h1 class="display-4">Welcome to our Shortcut Helper!</h1>
        <p class="lead">
          We specialize in Elipse and VS Code Shortcuts and How to Guides.
          Select your software from the dropdown below.
        </p>
      </div>
    </div>

    <!--SearchBar-->
    <div class="search-container">
      <input
        type="text"
        id="searchBar"
        class="shortcuts"
        placeholder="Search shortcuts..."
      />
      <div id="resultsDropdown"></div>
    </div>

    <!--Dropdown-->
    <div class="dropdown">
      <button class="dropbtn">Choose Software ▼</button>
      <div class="dropdown-content">
        <div class="software-option">
          Eclipse
          <div class="nested-dropdown">
            <div
              class="feature"
              data-software="eclipse"
              data-feature="shortcuts"
            >
              Shortcuts
            </div>
            <div class="feature" data-software="eclipse" data-feature="howto">
              How To
            </div>
          </div>
        </div>
        <div class="software-option">
          VS Code
          <div class="nested-dropdown">
            <div
              class="feature"
              data-software="vscode"
              data-feature="shortcuts"
            >
              Shortcuts
            </div>
            <div class="feature" data-software="vscode" data-feature="howto">
              How To
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="shortcutContent"></div>

    <script src="src/main.js"></script>
    <style>
      body {
        background: #0d1117;
        color: #c9d1d9;
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      /* Jumbotron */
      .jumbotron {
        background: linear-gradient(135deg, #161b22, #0d1117);
        color: #f0f6fc;
        padding: 80px 20px;
        text-align: center;
      }

      .jumbotron h1.display-4 {
        font-size: 3rem;
        margin-bottom: 20px;
      }
      .jumbotron p.lead {
        font-size: 1.5rem;
        margin-bottom: 30px;
        opacity: 0.8;
      }

      /* Dropdown Menu */
      .dropdown {
        position: relative;
        display: inline-block;
      }

      .dropbtn {
        background-color: #21262d;
        color: #f0f6fc;
        padding: 12px 20px;
        font-size: 16px;
        border: none;
        cursor: pointer;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        transition: background 0.2s;
      }

      .dropbtn {
        background-color: #21262d;
        color: #f0f6fc;
        padding: 12px 20px;
        font-size: 16px;
        border: none;
        cursor: pointer;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        transition: background 0.2s;
      }

      .dropdown:hover {
        background-color: #30363d;
      }

      /* Dropdown Content */
      .dropdown-content {
        display: none;
        position: absolute;
        background-color: #161b22;
        min-width: 200px;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        border-radius: 8px;
      }

      .dropdown:hover .dropdown-content {
        display: block;
      }

      .software-option {
        padding: 12px 15px;
        cursor: pointer;
        position: relative;
        transition: background 0.2s;
      }

      .software-option:hover {
        background-color: #21262d;
      }

      /* Nested Dropdown */
      .nested-dropdown {
        display: none;
        margin-top: 5px;
        margin-left: 10px;
        border-left: 2px solid #30363d;
        padding-left: 10px;
      }

      .software-option:hover .nested-dropdown {
        display: block;
      }

      .feature {
        padding: 6px 10px;
        cursor: pointer;
        border-radius: 4px;
      }

      .feature:hover {
        background-color: #30363d;
      }

      /* Shortcut Content */
      #shortcutContent {
        width: 100%;
        max-width: none;
        margin: 0;
        padding: 40px 20px;
        border-radius: 0;
        background: #161b22;
        box-shadow: none;
      }

      #shortcutContent h2 {
        margin-top: 0;
        color: #58a6ff;
      }

      #shortcutContent h3 {
        margin-top: 20px;
        color: #79c0ff;
      }

      #shortcutContent ul {
        list-style-type: none;
        padding-left: 0;
      }

      #shortcutContent li {
        margin-bottom: 10px;
        padding: 8px 12px;
        background-color: #21262d;
        border-radius: 4px;
        transition: background 0.2s;
      }

      #shortcutContent .inner-content {
        max-width: 800px;
        margin: 0 auto;
        padding: 0 20px;
      }
      .search-container {
        position: relative;
        width: 400px;
        margin: 20px auto;
      }

      #searchBar {
        width: 100%;
        padding: 12px 15px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #1e1f26;
        color: white;
        font-size: 16px;
      }

      #resultsDropdown {
        position: absolute;
        top: 110%;
        left: 0;
        width: 100%;
        background: #1e1f26;
        border-radius: 8px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        max-height: 300px;
        overflow-y: auto;
        display: none;
        z-index: 100;
      }

      .result-item {
        padding: 12px 15px;
        border-bottom: 1px solid #2c2c2c;
        transition: 0.2s;
      }

      .result-item:hover {
        background: #2a2c35;
        cursor: pointer;
      }

      .result-title {
        font-weight: bold;
        color: #4da3ff;
      }

      .result-shortcut {
        font-size: 14px;
        color: #ccc;
      }

      .highlight {
        background: #ffd54f;
        color: black;
        padding: 2px 4px;
        border-radius: 3px;
      }
    </style>
  </body>
</html>
